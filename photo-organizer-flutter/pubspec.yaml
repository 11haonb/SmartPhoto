name: photo_organizer
description: 智能图片整理 APP

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.1
  photo_manager: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  go_router: ^14.6.2
  image_picker: ^1.0.7
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  permission_handler: ^11.3.1
  pin_code_fields: ^8.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
